name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          # Используем --no-input для автоматической сборки
          briefcase create ios --no-input
          briefcase build ios --no-input

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          # Путь к собранному приложению в папке build
          path: |
            build/*/ios/xcode/build/Release-iphoneos/*.app
            build/*/ios/xcode/build/Release-iphoneos/*.ipa
          if-no-files-found: error
