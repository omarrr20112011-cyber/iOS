name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          briefcase create ios --no-input

      - name: Build for Generic Device
        run: |
          # Находим проект
          PROJECT_PATH=$(find build -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          
          cd "$PROJECT_DIR"
          
          # Сборка для архитектуры arm64 (как у iPhone), но в режиме симулятора
          # Это позволяет Xcode пропустить проверку реальных ключей Apple
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \

            | xcpretty || true

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: build/**/*.app
          if-no-files-found: error
