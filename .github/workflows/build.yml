name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          # Создаем структуру проекта Xcode для iOS
          briefcase create ios --no-input

      - name: Build iOS App for Device
        run: |
          # Собираем приложение для реального устройства (ARM64)
          # Передаем параметры Xcode, чтобы он не требовал подпись сертификатом
          briefcase build ios --device --no-input -- -codeSignIdentity="" -codeSignStyle=Manual CODE_SIGNING_ALLOWED=NO

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          # Ищем папку .app в результатах сборки
          path: build/**/*.app
          if-no-files-found: error

