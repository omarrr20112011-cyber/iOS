name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          briefcase create ios --no-input

      - name: Force Disable Code Signing
        run: |
          # Находим файл настроек проекта Xcode
          PROJECT_FILE=$(find build -name "project.pbxproj" | head -n 1)
          echo "Patching project file: $PROJECT_FILE"
          
          # Принудительно отключаем подпись внутри самого файла проекта
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' "$PROJECT_FILE"
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' "$PROJECT_FILE"
          sed -i '' 's/DevelopmentTeam = [A-Z0-9]*/DevelopmentTeam = ""/g' "$PROJECT_FILE"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "[^"]*"/PROVISIONING_PROFILE_SPECIFIER = ""/g' "$PROJECT_FILE"

      - name: Build with Xcode Direct
        run: |
          # Находим проект и папку
          PROJECT_PATH=$(find build -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          
          cd "$PROJECT_DIR"
          xcodebuild -project "$PROJECT_NAME.xcodeproj" \
                     -scheme "$PROJECT_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -arch arm64 \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     -allowProvisioningUpdates \
                     build

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: build/**/*.app
          if-no-files-found: error
