name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          briefcase create ios --no-input

      - name: Build iOS App for Device
        run: |
          # Флаг --device собирает для iPhone (ARM64)
          # CODE_SIGNING_ALLOWED=NO позволяет собрать проект без сертификата Apple
          briefcase build ios --device --no-input -- -- -codeSignIdentity="" -codeSignStyle=Manual CODE_SIGNING_ALLOWED=NO

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: |
            build/**/*.app
          if-no-files-found: error
