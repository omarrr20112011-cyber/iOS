name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          briefcase create ios --no-input

      - name: Create Temporary Keychain for Signing
        run: |
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

      - name: Build with Xcode (Ad-Hoc)
        run: |
          PROJECT_PATH=$(find build -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          
          cd "$PROJECT_DIR"
          
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -derivedDataPath "build/DerivedData"

      - name: Collect Build Artifacts
        run: |
          # Создаем отдельную папку для результата
          mkdir -p output
          # Ищем все .app файлы и копируем их в папку output
          find . -name "*.app" -type d -exec cp -R {} output/ \;
          echo "Found apps:"
          ls -R output

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          # Теперь мы берем файл из гарантированного места
          path: output/*.app
          if-no-files-found: error
