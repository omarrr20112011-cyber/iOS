name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          briefcase create ios --no-input

      - name: Build with Xcode Archive Mode
        run: |
          PROJECT_PATH=$(find build -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          
          cd "$PROJECT_DIR"
          
          # Собираем "Архив" — это более глубокая сборка, которая часто обходит ошибку 65
          xcodebuild archive \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "./build/$PROJECT_NAME.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -allowProvisioningUpdates

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          # Ищем приложение внутри созданного архива
          path: |
            build/**/*.xcarchive/Products/Applications/*.app
            build/**/*.app
          if-no-files-found: error
