name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS App
        run: |
          briefcase create ios --no-input

      - name: Create Temporary Keychain for Signing
        run: |
          # Создаем временное хранилище ключей для обхода проверки подписи
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

      - name: Build with Xcode (Ad-Hoc)
        run: |
          # Находим проект и собираем его
          PROJECT_PATH=$(find build -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          
          cd "$PROJECT_DIR"
          
          # Сборка Ad-Hoc (подпись "-") — это легальный способ для Xcode собрать бинарник без аккаунта
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          # Ищем .app везде, где его мог оставить Xcode
          path: |
            **/build/Release-iphoneos/*.app
            **/Products/Release-iphoneos/*.app
            **/*.app
          if-no-files-found: error
